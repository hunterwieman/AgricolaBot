<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AgricolaBot</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="header">
    <div id="header-main">
      <span id="round-label">Round —/—</span>
      <span id="phase-label">Phase —</span>
      <span id="sp-label">SP P—</span>
      <span id="decider-label">Deciding: P—</span>
      <span id="harvest-note"></span>
    </div>
    <div id="header-actions">
      <label class="header-toggle" title="Auto-submit whenever there is exactly one legal action.">
        <input type="checkbox" id="fast-mode-toggle">
        <span>Fast mode</span>
      </label>
      <label class="header-toggle" title="Show the AI's value (Q) and visit count for each of your options. Runs in the background; never blocks your move. Configure the analysis model/budget in the row that appears below.">
        <input type="checkbox" id="analysis-toggle">
        <span>Show analysis</span>
      </label>
      <label class="header-toggle" title="Pause after each of your turns to confirm or undo before the AI replies. Forced/singleton turns are not paused.">
        <input type="checkbox" id="confirm-turn-toggle">
        <span>Confirm turns</span>
      </label>
      <button id="reset-btn">New game</button>
      <button id="download-trace-btn" title="Download the full action trace and seed for this game as JSON. Useful for bug reports.">Download trace</button>
      <span id="connection-state" class="conn-disconnected">offline</span>
    </div>
  </div>

  <!-- Analysis control row — only shown while "Show analysis" is on. Lets you
       configure the read-only overlay independently of how the bot plays. -->
  <div id="analysis-controls" class="hidden">
    <span class="analysis-ctl">
      <span class="analysis-ctl-label">Model</span>
      <span id="analysis-mode-group" class="seg" title="Which value head the analysis evaluates with. margin = points of expected score difference; outcome = expected win/draw/loss in [-1,1]; mix = the α-blend of the two (what the deployed bot uses).">
        <button type="button" data-mode="margin">margin</button>
        <button type="button" data-mode="outcome">outcome</button>
        <button type="button" data-mode="mix">mix</button>
      </span>
    </span>
    <span id="analysis-alpha-wrap" class="analysis-ctl hidden" title="Mix blend weight α: the leaf value is α·margin + (1−α)·outcome. 1.0 = pure margin, 0.0 = pure outcome. Deployed bot uses 0.9.">
      <span class="analysis-ctl-label">α</span>
      <input type="number" id="analysis-alpha" min="0" max="1" step="0.05" value="0.9">
    </span>
    <span class="analysis-ctl">
      <span class="analysis-ctl-label">Sims</span>
      <input type="number" id="analysis-sims" min="100" step="100">
    </span>
    <span class="analysis-ctl" title="Exploration constant (c_uct): higher = explore wider, lower = search deeper. Analysis only — does not affect how the bot plays.">
      <span class="analysis-ctl-label">c_uct</span>
      <input type="number" id="analysis-cuct" min="0.2" step="0.2" value="1.0">
      <span class="analysis-ctl-hint">higher = explore wider, lower = search deeper</span>
    </span>
  </div>

  <!-- Turn controls (Confirm / Undo) — rendered above the boards. -->
  <div id="turn-controls"></div>

  <div id="main">
    <div id="col-board" class="panel">
      <h2>Action board</h2>
      <div id="action-board"></div>
      <h3>Major improvements</h3>
      <div id="major-board"></div>
    </div>

    <div id="col-p0" class="panel">
      <h2 id="p0-header">P0</h2>
      <div id="p0-summary" class="player-summary"></div>
      <div id="p0-farmyard-container" class="farmyard-container"></div>
      <div id="p0-improvements"></div>
    </div>

    <div id="col-p1" class="panel">
      <h2 id="p1-header">P1</h2>
      <div id="p1-summary" class="player-summary"></div>
      <div id="p1-farmyard-container" class="farmyard-container"></div>
      <div id="p1-improvements"></div>
    </div>
  </div>

  <div id="decision-panel" class="panel">
    <h2>Decision</h2>
    <div id="pending-breadcrumb"></div>
    <div id="decider-banner"></div>
    <div id="action-menu"></div>
  </div>

  <div id="log-panel" class="panel">
    <h2>Round log</h2>
    <div id="round-log"></div>
  </div>

  <div id="game-over-modal" class="modal hidden">
    <div class="modal-body">
      <h2>Game over</h2>
      <div id="game-over-content"></div>
      <button id="game-over-close">Close</button>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
